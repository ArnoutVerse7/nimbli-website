            <section class="register-form">

                    <!-- Linker kolom -->

                        <div class="form-card">
                            <div class="form-group">
                                <label for="praktijknaam">Praktijknaam</label>
                                <input type="text" id="praktijknaam" name="praktijknaam" required>
                                <p id="practiceError" style="color:red; display:none; margin-top:5px;"></p>

                            <div class="form-group">
                                <label>Contactpersoon</label>
                                <div class="form-row form-row--2">
                                    <input type="text" name="voornaam" placeholder="Voornaam" required>
                                    <input type="text" name="achternaam" placeholder="Achternaam" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="land">Land</label>
                                <input type="text" id="land" name="land" placeholder="België" required>
                            </div>

                            <div class="form-group">
                                <label>Adres</label>
                                <div class="form-row form-row--adres">
                                    <input type="text" name="straatnaam" placeholder="Straatnaam" required>
                                    <input type="text" name="nummer" placeholder="Nr" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Plaats</label>
                                <div class="form-row form-row--2">
                                    <input type="text" name="postcode" placeholder="Postcode" required>
                                    <input type="text" name="plaatsnaam" placeholder="Plaatsnaam" required>
                                </div>
                            </div>
                        </div>

                        <label class="checkbox-row">
                            <input type="checkbox" name="zelfde-als-factuuradres">
                            <span>Praktijkadres is hetzelfde als factuuradres.</span>
                        </label>

                        <h2 class="register-section__title register-section__title--mt">Factuuradres</h2>

                        <div class="form-card">
                            <div class="form-group">
                                <label for="factuurnaam">Naam</label>
                                <input type="text" id="factuurnaam" name="factuurnaam" required>
                            </div>

                            <div class="form-group">
                                <label for="factuurland">Land</label>
                                <input type="text" id="factuurland" name="factuurland" placeholder="België" required>
                            </div>

                            <div class="form-group">
                                <label>Adres</label>
                                <div class="form-row form-row--adres">
                                    <input type="text" name="factuurstraatnaam" placeholder="Straatnaam" required>
                                    <input type="text" name="factuurnummer" placeholder="Nr" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Plaats</label>
                                <div class="form-row form-row--2">
                                    <input type="text" name="factuurpostcode" placeholder="Postcode" required>
                                    <input type="text" name="factuurplaatsnaam" placeholder="Plaatsnaam" required>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Rechter kolom -->
                    <div class="register-column">
                        <h2 class="register-section__title">Overige</h2>

                        <div class="form-card">
                            <div class="form-group">
                                <label for="telefoonnummer">Telefoonnummer</label>
                                <input type="text" id="telefoonnummer" name="telefoonnummer" required>
                            </div>

                            <div class="form-group">
                                <label for="email-algemeen">E-mailadres algemeen</label>
                                <input type="email" id="email-algemeen" name="email-algemeen" required>
                            </div>

                            <div class="form-group">
                                <label for="email-facturen">E-mailadres facturen</label>
                                <input type="email" id="email-facturen" name="email-facturen" required>
                            </div>

                            <div class="form-group">
                                <label for="kvk">KVK-nummer</label>
                                <input type="text" id="kvk" name="kvk" placeholder="Optioneel">
                            </div>

                            <div class="form-group">
                                <label for="btw">BTW-nummer</label>

                            </div>
                        </div>
                    </div>

    <script>
        initRegistrationStorage();

        const nextButtons = [
            document.getElementById("nextStepBtnDesktop"),
            document.getElementById("nextStepBtnMobile")
        ].filter(Boolean);

        const practiceError = document.getElementById("practiceError");
        const practiceNameInput = document.getElementById("praktijknaam");

        function hidePracticeError() {
            if (!practiceError) return;
            practiceError.textContent = "";
            practiceError.style.display = "none";
        }

        function showPracticeError(message) {
            if (!practiceError) return;
            practiceError.textContent = message;
            practiceError.style.display = "block";
        }

        function saveStep1Data() {
            const data = getRegistrationData();

            data.step1 = {
                praktijknaam: document.getElementById("praktijknaam")?.value.trim() || "",
                contactpersoon: {
                    voornaam: document.querySelector('input[name="voornaam"]')?.value.trim() || "",
                    achternaam: document.querySelector('input[name="achternaam"]')?.value.trim() || ""
                },
                land: document.getElementById("land")?.value.trim() || "",
                adres: {
                    straatnaam: document.querySelector('input[name="straatnaam"]')?.value.trim() || "",
                    nummer: document.querySelector('input[name="nummer"]')?.value.trim() || ""
                },
                plaats: {
                    postcode: document.querySelector('input[name="postcode"]')?.value.trim() || "",
                    plaatsnaam: document.querySelector('input[name="plaatsnaam"]')?.value.trim() || ""
                },
                zelfdeAlsFactuuradres: document.querySelector('input[name="zelfde-als-factuuradres"]')?.checked || false,
                factuuradres: {
                    naam: document.getElementById("factuurnaam")?.value.trim() || "",
                    land: document.getElementById("factuurland")?.value.trim() || "",
                    straatnaam: document.querySelector('input[name="factuurstraatnaam"]')?.value.trim() || "",
                    nummer: document.querySelector('input[name="factuurnummer"]')?.value.trim() || "",
                    postcode: document.querySelector('input[name="factuurpostcode"]')?.value.trim() || "",
                    plaatsnaam: document.querySelector('input[name="factuurplaatsnaam"]')?.value.trim() || ""
                },
                overige: {
                    telefoonnummer: document.getElementById("telefoonnummer")?.value.trim() || "",
                    emailAlgemeen: document.getElementById("email-algemeen")?.value.trim() || "",
                    emailFacturen: document.getElementById("email-facturen")?.value.trim() || "",
                    kvk: document.getElementById("kvk")?.value.trim() || "",
                    btw: document.getElementById("btw")?.value.trim() || ""
                }
            };

            data.currentStep = 1;
            saveRegistrationData(data);
        }

        function populateStep1Form() {
            const data = getRegistrationData();
            const step1 = data.step1 || {};

            document.getElementById("praktijknaam").value = step1.praktijknaam || "";
            document.querySelector('input[name="voornaam"]').value = step1.contactpersoon?.voornaam || "";
            document.querySelector('input[name="achternaam"]').value = step1.contactpersoon?.achternaam || "";
            document.getElementById("land").value = step1.land || "";
            document.querySelector('input[name="straatnaam"]').value = step1.adres?.straatnaam || "";
            document.querySelector('input[name="nummer"]').value = step1.adres?.nummer || "";
            document.querySelector('input[name="postcode"]').value = step1.plaats?.postcode || "";
            document.querySelector('input[name="plaatsnaam"]').value = step1.plaats?.plaatsnaam || "";

            document.querySelector('input[name="zelfde-als-factuuradres"]').checked = !!step1.zelfdeAlsFactuuradres;

            document.getElementById("factuurnaam").value = step1.factuuradres?.naam || "";
            document.getElementById("factuurland").value = step1.factuuradres?.land || "";
            document.querySelector('input[name="factuurstraatnaam"]').value = step1.factuuradres?.straatnaam || "";
            document.querySelector('input[name="factuurnummer"]').value = step1.factuuradres?.nummer || "";
            document.querySelector('input[name="factuurpostcode"]').value = step1.factuuradres?.postcode || "";
            document.querySelector('input[name="factuurplaatsnaam"]').value = step1.factuuradres?.plaatsnaam || "";

            document.getElementById("telefoonnummer").value = step1.overige?.telefoonnummer || "";
            document.getElementById("email-algemeen").value = step1.overige?.emailAlgemeen || "";
            document.getElementById("email-facturen").value = step1.overige?.emailFacturen || "";
            document.getElementById("kvk").value = step1.overige?.kvk || "";
            document.getElementById("btw").value = step1.overige?.btw || "";
        }

        function validateStep1RequiredFields() {
            const requiredFields = [
                document.getElementById("praktijknaam"),
                document.querySelector('input[name="voornaam"]'),
                document.querySelector('input[name="achternaam"]'),
                document.getElementById("land"),
                document.querySelector('input[name="straatnaam"]'),
                document.querySelector('input[name="nummer"]'),
                document.querySelector('input[name="postcode"]'),
                document.querySelector('input[name="plaatsnaam"]'),
                document.getElementById("telefoonnummer"),
                document.getElementById("email-algemeen"),
                document.getElementById("email-facturen")
            ];

            const billingSameAsPractice = document.querySelector('input[name="zelfde-als-factuuradres"]')?.checked;

            if (!billingSameAsPractice) {
                requiredFields.push(
                    document.getElementById("factuurnaam"),
                    document.getElementById("factuurland"),
                    document.querySelector('input[name="factuurstraatnaam"]'),
                    document.querySelector('input[name="factuurnummer"]'),
                    document.querySelector('input[name="factuurpostcode"]'),
                    document.querySelector('input[name="factuurplaatsnaam"]')
                );
            }

            for (const field of requiredFields) {
                if (!field) continue;

                if (!field.value.trim()) {
                    field.reportValidity();
                    field.focus();
                    return false;
                }
            }

            const emailFields = [
                document.getElementById("email-algemeen"),
                document.getElementById("email-facturen")
            ];

            for (const field of emailFields) {
                if (field && !field.checkValidity()) {
                    field.reportValidity();
                    field.focus();
                    return false;
                }
            }

            return true;
        }

        async function checkPracticeExists(practiceName) {
            const normalizedName = practiceName.trim();

            const { data, error } = await supabaseClient
                .from("marketing_registrations")
                .select("id, practice_name")
                .ilike("practice_name", normalizedName)
                .limit(1);

            if (error) {
                console.error("Practice check error:", error);
                throw error;
            }

            return Array.isArray(data) && data.length > 0;
        }

        async function handleNextStep(clickedButton) {
            hidePracticeError();

            if (!validateStep1RequiredFields()) {
                return;
            }

            const practiceName = practiceNameInput?.value.trim() || "";
            const originalText = clickedButton.textContent;

            clickedButton.disabled = true;
            clickedButton.textContent = "Controleren...";

            try {
                const exists = await checkPracticeExists(practiceName);

                if (exists) {
                    showPracticeError("Deze praktijknaam bestaat al. Kies een andere naam.");
                    clickedButton.disabled = false;
                    clickedButton.textContent = originalText;
                    return;
                }

                saveStep1Data();
                window.location.href = "registratie2.html";
            } catch (error) {
                showPracticeError("Er ging iets mis bij het controleren van de praktijknaam.");
                clickedButton.disabled = false;
                clickedButton.textContent = originalText;
            }
        }

        nextButtons.forEach((button) => {
            button.addEventListener("click", () => handleNextStep(button));
        });

        practiceNameInput?.addEventListener("input", hidePracticeError);

        populateStep1Form();

        const navToggle = document.querySelector('.nav-toggle');
        const mobileMenu = document.getElementById('mobileMenu');

        if (navToggle && mobileMenu) {
            navToggle.addEventListener('click', () => {
                const isOpen = navToggle.classList.toggle('is-open');
                mobileMenu.classList.toggle('is-open', isOpen);
                navToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
            });

            mobileMenu.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    navToggle.classList.remove('is-open');
                    mobileMenu.classList.remove('is-open');
                    navToggle.setAttribute('aria-expanded', 'false');
                });
            });
        }
    </script>
